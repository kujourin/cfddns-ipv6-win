name: Build C++ Application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build
      run: cl.exe ddns_ipv6.cpp /EHsc /O2 /link /out:cfddns-ipv6.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfddns-ipv6-win
        path: cfddns-ipv6.exe
